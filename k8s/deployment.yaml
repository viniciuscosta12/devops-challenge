apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  labels:
    app: devops-challenge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-challenge
  template:
    metadata:
      labels:
        app: devops-challenge
    spec:
      containers:
      - name: devops-challenge-app
        image: devops-challenge-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV
        # Se houvesse um secret (ex: DB_PASSWORD), injetaríamos via SecretKeyRef aqui, e não em texto plano.
        
        # Requests e Limits
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
            
        # Liveness Probe (Se falhar, o K8s reinicia o container)
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
          
        # Readiness Probe (Se falhar, o K8s tira o container do balanceamento do Service, mas não o reinicia)
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3